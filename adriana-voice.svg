<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Animazione voce Adriana">
  <defs>
    <radialGradient id="g1" cx="48%" cy="35%" r="68%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="24%" stop-color="#9effff"/>
      <stop offset="58%" stop-color="#20d9ff"/>
      <stop offset="100%" stop-color="#3a61ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="40%" cy="62%" r="62%">
      <stop offset="0%" stop-color="#fff0ff"/>
      <stop offset="35%" stop-color="#ff38e8"/>
      <stop offset="100%" stop-color="#7c42ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="62%" cy="58%" r="60%">
      <stop offset="0%" stop-color="#fcffd2"/>
      <stop offset="35%" stop-color="#96ff5f"/>
      <stop offset="100%" stop-color="#05c6a8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <style>
      .halo{transform-origin:120px 120px;animation:halo 1.5s ease-in-out infinite}
      .core{transform-origin:120px 120px;animation:spin 2.4s ease-in-out infinite}
      .b1,.b2,.b3,.spark{transform-box:fill-box;transform-origin:center}
      .b1{animation:b1 1.35s ease-in-out infinite}
      .b2{animation:b2 1.55s ease-in-out infinite}
      .b3{animation:b3 1.7s ease-in-out infinite}
      .ring{transform-origin:120px 120px;animation:ring 1.1s linear infinite}
      .spark{animation:spark 1.4s ease-in-out infinite}
      @keyframes halo{0%,100%{transform:scale(.86);opacity:.26}50%{transform:scale(1.2);opacity:.62}}
      @keyframes spin{0%,100%{transform:rotate(-10deg) scale(1)}50%{transform:rotate(16deg) scale(1.08)}}
      @keyframes b1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(9px,-12px) scale(1.2)}}
      @keyframes b2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-12px,9px) scale(1.22)}}
      @keyframes b3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(12px,10px) scale(1.18)}}
      @keyframes ring{to{transform:rotate(360deg)}}
      @keyframes spark{0%,100%{opacity:.18;transform:translateY(8px) scale(.75)}50%{opacity:.95;transform:translateY(-9px) scale(1.18)}}
    </style>
  </defs>
  <rect width="240" height="240" fill="transparent"/>
  <g filter="url(#glow)" opacity=".75">
    <circle class="halo" cx="120" cy="120" r="76" fill="#4defff"/>
    <circle class="halo" cx="118" cy="124" r="58" fill="#ff42ef" style="animation-delay:.2s"/>
  </g>
  <g class="core" filter="url(#blur)">
    <ellipse class="b1" cx="126" cy="94" rx="70" ry="52" fill="url(#g1)" opacity=".98"/>
    <ellipse class="b2" cx="91" cy="143" rx="48" ry="70" fill="url(#g2)" opacity=".98"/>
    <ellipse class="b3" cx="149" cy="142" rx="60" ry="50" fill="url(#g3)" opacity=".9"/>
    <circle cx="116" cy="118" r="34" fill="#ffffff" opacity=".26"/>
  </g>
  <g class="ring" opacity=".55">
    <circle cx="120" cy="120" r="74" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-dasharray="38 30"/>
    <circle cx="120" cy="120" r="91" fill="none" stroke="#8effff" stroke-width="2" stroke-linecap="round" stroke-dasharray="18 44"/>
  </g>
  <g fill="#ffffff">
    <circle class="spark" cx="75" cy="88" r="4.8"/>
    <circle class="spark" cx="174" cy="96" r="4" style="animation-delay:.25s"/>
    <circle class="spark" cx="152" cy="180" r="4.5" style="animation-delay:.45s"/>
  </g>
</svg>
